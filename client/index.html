<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="Frequency Factory — Where raw tracks get built into hits. Submit your music, get rated by the community, and stream live 24/7." />
    <meta name="theme-color" content="#ff6d00" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Frequency Factory" />
    <meta property="og:description" content="Where raw tracks get built into hits. Submit, rate, and stream live 24/7." />
    <meta property="og:image" content="/assets/frequency-crown-actual.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Frequency Factory" />
    <meta name="twitter:description" content="Where raw tracks get built into hits." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/frequency-crown-actual.png" />
    <link rel="apple-touch-icon" href="/assets/frequency-crown-actual.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Frequency Factory</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Load analytics only when configured via environment variables
      (function() {
        var endpoint = '%VITE_ANALYTICS_ENDPOINT%';
        var websiteId = '%VITE_ANALYTICS_WEBSITE_ID%';
        if (endpoint && !endpoint.includes('VITE_ANALYTICS') && websiteId && !websiteId.includes('VITE_ANALYTICS')) {
          var s = document.createElement('script');
          s.defer = true;
          s.src = endpoint + '/umami';
          s.setAttribute('data-website-id', websiteId);
          document.body.appendChild(s);
        }
      })();
    </script>
  </body>

</html>
